<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ส่งลิงก์ยืนยันอีเมลใหม่ — pdlife.app</title>
<link rel="icon" href="https://cdn.pdlife.app/general/pdlife-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
{{template "theme-css" .}}
<style>
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.25rem; }
.card { padding: 2.25rem 1.75rem; max-width: 26rem; width: 100%; text-align: center; }
.brand { font-family: 'Anuphan', sans-serif; font-weight: 800; font-size: 1.15rem; color: var(--color-ink);
  text-decoration: none; display: inline-block; padding-bottom: 3px; border-bottom: 3px solid var(--color-brand); margin-bottom: 1.25rem; }
h1 { font-size: 1.5rem; margin-bottom: 0.6rem; }
p { color: var(--color-ink); margin-bottom: 1.5rem; }
label { display: block; font-weight: 700; margin-bottom: 0.4rem; text-align: left; }
input[type="email"] {
  width: 100%; font-family: 'Sarabun', sans-serif; font-size: 1rem;
  padding: 0.75rem 0.9rem; border: 3px solid var(--color-ink); border-radius: 10px;
  margin-bottom: 1.1rem; background: var(--color-surface); color: var(--color-ink);
}
</style>
</head>
<body>
  <div class="card">
    <a class="brand" href="/">pdlife.app</a>
    {{if .Sent}}
      <h1>ส่งลิงก์แล้ว (ถ้ามีบัญชีนี้)</h1>
      <p>หากอีเมลนี้มีอยู่ในระบบและยังไม่ยืนยัน คุณจะได้รับอีเมลยืนยันใหม่ในไม่ช้า</p>
      <a class="btn" href="/">กลับหน้าแรก</a>
    {{else}}
      <h1>ส่งลิงก์ยืนยันอีเมลใหม่</h1>
      <p>กรอกอีเมลที่ใช้สมัคร ระบบจะส่งลิงก์ยืนยันใหม่ให้</p>
      <form method="POST" action="/resend-verification">
        <label for="email">อีเมล</label>
        <input type="email" id="email" name="email" required>
        <button type="submit" class="btn btn-primary">ส่งลิงก์ใหม่</button>
      </form>
    {{end}}
  </div>
</body>
</html>
