<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — pdlife.app</title>
<link rel="icon" href="https://cdn.pdlife.app/general/pdlife-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
{{template "theme-css" .}}
<style>
.legal-main { padding: 2rem 0 3rem; }
.legal-content { max-width: 42rem; margin: 0 auto; }
.draft-notice {
  background: var(--color-alert-tint);
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1rem 1.25rem;
  font-weight: 700;
  margin-bottom: 1.75rem;
}
.legal-content h1 { font-size: 1.7rem; margin-bottom: 1rem; }
.legal-content p { margin-bottom: 1rem; }
</style>
</head>
<body>
{{template "site-header" .}}
<main class="page-main legal-main">
  <div class="wrap legal-content">
    <div class="draft-notice">ฉบับร่าง — อยู่ระหว่างตรวจสอบทางกฎหมาย</div>
    <h1>{{.Title}}</h1>
    <p>{{.Placeholder}}</p>
  </div>
</main>
{{template "site-footer" .}}
{{template "cookie-consent" .}}
</body>
</html>
