{{define "apd-shell-css"}}
<style>
.apd-header {
  background: var(--color-ink);
  border-bottom: var(--border);
  position: sticky;
  top: 0;
  z-index: 20;
}
.apd-header .wrap { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.9rem 1.25rem; max-width: 1040px; }
.apd-brand { color: #fff; font-family: 'Anuphan', sans-serif; font-weight: 800; font-size: 1.05rem; text-decoration: none; white-space: nowrap; }
.apd-nav { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
.apd-nav a {
  color: #fff; text-decoration: none; font-weight: 700; font-size: 0.85rem;
  padding: 0.45rem 0.85rem; border-radius: 999px; border: 2px solid transparent;
}
.apd-nav a.active { border-color: #fff; }
.apd-nav a:hover { border-color: #fff; }
.apd-user-form button {
  font-family: inherit; font-weight: 700; font-size: 0.8rem; color: #fff;
  background: transparent; border: 2px solid rgba(255,255,255,0.5); border-radius: 999px;
  padding: 0.4rem 0.8rem; cursor: pointer;
}
.apd-user-form button:hover { border-color: #fff; }
.apd-main { max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; width: 100%; }
.apd-page-head { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; justify-content: space-between; margin-bottom: 1.5rem; }
.apd-eyebrow { color: var(--color-brand); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.14em; margin-bottom: 0.4rem; }
</style>
{{end}}

{{define "apd-header"}}
<header class="apd-header">
  <div class="wrap">
    <a class="apd-brand" href="/apd">สมุดบันทึก APD</a>
    <nav class="apd-nav">
      <a href="/apd" class="{{if eq .Active "dashboard"}}active{{end}}">ภาพรวม</a>
      <a href="/apd/new" class="{{if eq .Active "new"}}active{{end}}">บันทึกใหม่</a>
      <a href="/apd/logs" class="{{if eq .Active "logs"}}active{{end}}">รายการบันทึก</a>
    </nav>
    <form class="apd-user-form" method="post" action="/logout">
      <button type="submit">{{if .User}}{{.User.Nickname}} · ออกจากระบบ{{else}}ออกจากระบบ{{end}}</button>
    </form>
  </div>
</header>
{{end}}
