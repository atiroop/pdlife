{{define "password-toggle-css"}}
<style>
/* The toggle button is height:100% of this wrapper, so the wrapper's
   box has to be exactly the input's box - nothing more. Every page's
   own input[type="password"] rule carries its own margin-bottom, and
   if that margin were left on the input, block margin-collapsing
   rules make the *wrapper's* measured height ambiguous (browsers were
   observed sizing it to the input's height *plus* the margin, taller
   than the visible input, which pushed the icon a few pixels below
   true-center). Moving the margin from the input onto the wrapper
   sidesteps the ambiguity entirely: the input has no margin left to
   collapse, so the wrapper's height can only ever equal the input's.
   The 0,2,1-specificity selector below beats every page's own
   `input[type="password"] { margin-bottom: ... }` regardless of
   <style> order, so this applies everywhere the wrapper is used. */
.password-field-wrap { position: relative; margin-bottom: 1.1rem; }
.password-field-wrap input[type="password"],
.password-field-wrap input[type="text"] { padding-right: 2.75rem; margin-bottom: 0; }
.password-toggle-btn {
  position: absolute; right: 0.5rem; top: 0; height: 100%;
  display: flex; align-items: center; padding: 0 0.4rem;
  background: none; border: none; cursor: pointer; color: var(--color-ink); opacity: 0.55;
}
.password-toggle-btn:hover { opacity: 1; }
.password-toggle-btn svg { display: block; pointer-events: none; }
</style>
{{end}}

{{/* No arguments needed: the toggle JS locates its input via
     .closest(".password-field-wrap"), not by id, so this button is
     identical everywhere it's dropped in. */}}
{{define "password-toggle-button"}}
<button type="button" class="password-toggle-btn" aria-label="แสดงรหัสผ่าน" aria-pressed="false" onclick="pdlifeTogglePassword(this)">
  <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
  <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" style="display:none"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a13.16 13.16 0 0 1-3.16 3.94M6.61 6.61A13.53 13.53 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 5.39-1.61M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
</button>
{{end}}

{{define "password-toggle-js"}}
<script>
// Shared by every page with a password field (login, register,
// reset-password, profile). Finds the input via the nearest
// .password-field-wrap rather than an id, so the same button markup
// works no matter how many password fields are on the page.
function pdlifeTogglePassword(btn) {
  var wrap = btn.closest('.password-field-wrap');
  var input = wrap.querySelector('input');
  var showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  btn.setAttribute('aria-label', showing ? 'แสดงรหัสผ่าน' : 'ซ่อนรหัสผ่าน');
  btn.setAttribute('aria-pressed', showing ? 'false' : 'true');
  wrap.querySelector('.icon-eye').style.display = showing ? '' : 'none';
  wrap.querySelector('.icon-eye-off').style.display = showing ? 'none' : '';
}
</script>
{{end}}
