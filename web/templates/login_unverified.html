<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ยืนยันอีเมลก่อนเข้าสู่ระบบ — pdlife.app</title>
<link rel="icon" href="https://cdn.pdlife.app/general/pdlife-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
{{template "theme-css" .}}
<style>
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.25rem; }
.card { padding: 2.25rem 1.75rem; max-width: 26rem; width: 100%; text-align: center; }
.brand { font-family: 'Anuphan', sans-serif; font-weight: 800; font-size: 1.15rem; color: var(--color-ink);
  text-decoration: none; display: inline-block; padding-bottom: 3px; border-bottom: 3px solid var(--color-brand); margin-bottom: 1.25rem; }
h1 { font-size: 1.5rem; margin-bottom: 0.6rem; }
p { color: var(--color-ink); margin-bottom: 1.5rem; }
.warn { background: var(--color-watch-tint); border: 3px solid var(--color-ink); border-radius: 10px; padding: 0.9rem; font-weight: 700; margin-bottom: 1.5rem; }
</style>
</head>
<body>
  <div class="card">
    <a class="brand" href="/">pdlife.app</a>
    <h1>ยังไม่ได้ยืนยันอีเมล</h1>
    <div class="warn">บัญชี {{.Email}} ยังไม่ได้ยืนยันอีเมล</div>
    <p>กรุณาตรวจสอบอีเมลและกดลิงก์ยืนยันก่อนเข้าสู่ระบบ</p>
    <a class="btn btn-primary" href="/resend-verification">ส่งลิงก์ยืนยันใหม่</a>
  </div>
</body>
</html>
